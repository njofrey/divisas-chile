<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://mindicador.cl https://api.bluelytics.com.ar https://www.datos.gov.co; base-uri 'self';">
    
    <title>Convertidor de Moneda Pro | by Nico Jofré</title>
    <meta name="description" content="Un convertidor de moneda rápido y elegante que convierte UF, CLP y USD a múltiples divisas con valores actualizados.">
    
    <meta property="og:title" content="Convertidor de Moneda Pro">
    <meta property="og:description" content="Convierte UF, CLP y USD a EUR, ARS, COP y más.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_CL">
    <meta name="twitter:card" content="summary">
    <link rel="canonical" href="https://convertidor-moneda.vercel.app/">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💱</text></svg>">

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="main-container">
        
        <div class="card">
            <h1>Convertidor de Moneda</h1>
            <div class="uf-display" id="uf-rate-display" aria-live="polite">Cargando valores...</div>
            <div class="input-container">
                <div class="amount-input-section">
                    <label for="amount-input">Monto a Convertir</label>
                    <input type="text" inputmode="decimal" id="amount-input" placeholder="Ej: 1.000,50">
                </div>
                <div class="currency-selector-section">
                    <label>Desde</label>
                    <div id="currency-selector" class="currency-pills">
                        <button class="pill active" data-value="uf">UF</button>
                        <button class="pill" data-value="clp">CLP</button>
                        <button class="pill" data-value="usd">USD</button>
                        <button class="pill" data-value="cop">COP</button>
                    </div>
                </div>
            </div>
            <div id="results-container" aria-live="polite"></div>
        </div>
        
        <div class="footer">
            <p class="credit">
                Con cariño para Nico García <span style="color: black;">🖤</span> de Nicolás Jofré
            </p>
            <p class="data-source">Datos obtenidos de mindicador.cl, bluelytics.com.ar y datos.gov.co</p>
        </div>
    </div>

</body>
</html>
